<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手工艺品小店 | 原创手工制作</title>
    <!-- 引入简易样式库，无需自己写复杂CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .craft-item { margin-bottom: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px; }
        .craft-img { width: 100%; height: 250px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; }
        .contact-section { margin-top: 50px; padding: 20px; background-color: #f8f9fa; border-radius: 8px; }
        .pay-img { width: 200px; height: 200px; margin: 10px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <!-- 页面标题 -->
        <h1 class="text-center mb-5">✨ 手工工艺品小店 ✨</h1>

        <!-- 商品展示区（可复制多个div.craft-item添加更多商品） -->
        <div class="row">
            <!-- 商品1 -->
            <div class="col-md-4 craft-item">
                <img src="https://替换为你的工艺品图片链接1" class="craft-img" alt="手工编织篮">
                <h3>手工编织篮</h3>
                <p>材质：天然藤条 | 尺寸：20×15cm</p>
                <p class="text-danger fw-bold">价格：¥89.00</p>
                <p>纯手工编织，无化学添加，适合收纳小物件</p>
            </div>
            <!-- 商品2 -->
            <div class="col-md-4 craft-item">
                <img src="https://替换为你的工艺品图片链接2" class="craft-img" alt="陶瓷手绘杯">
                <h3>陶瓷手绘杯</h3>
                <p>材质：高温陶瓷 | 容量：300ml</p>
                <p class="text-danger fw-bold">价格：¥69.00</p>
                <p>原创手绘图案，可定制文字，食品级釉面</p>
            </div>
            <!-- 商品3 -->
            <div class="col-md-4 craft-item">
                <img src="https://替换为你的工艺品图片链接3" class="craft-img" alt="木质书签">
                <h3>实木雕刻书签</h3>
                <p>材质：胡桃木 | 尺寸：15×3cm</p>
                <p class="text-danger fw-bold">价格：¥39.00</p>
                <p>激光雕刻图案，可定制名字，礼盒包装</p>
            </div>
        </div>

        <!-- 购买联系方式/收款码 -->
        <div class="contact-section text-center">
            <h2>🛒 购买方式</h2>
            <p>添加微信/支付宝下单，备注工艺品名称即可</p>
            <!-- 替换为你的收款码图片链接 -->
            <img src="https://替换为你的微信收款码链接" class="pay-img" alt="微信收款码">
            <img src="https://替换为你的支付宝收款码链接" class="pay-img" alt="支付宝收款码">
            <p class="mt-3">联系电话：138XXXX1234 | 邮箱：craft@example.com</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
